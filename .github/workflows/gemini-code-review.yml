name: Gemini Code Review
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize]

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GoogleGenerativeAI
        run: npm install @google/generative-ai

      - name: Get PR Context and Filtered Git Diff
        id: get_diff
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          git fetch origin "${{ github.event.pull_request.head.ref }}"
          
          # 💡 최적화: .swift 파일만 필터링하여 diff 추출 (불필요한 파일 제외)
          git diff "origin/${{ github.event.pull_request.base.ref }}"..."origin/${{ github.event.pull_request.head.ref }}" -- "*.swift" > diff.txt
          
          # Swift 파일 변경사항이 없으면 워크플로 중단
          if [ ! -s diff.txt ]; then
            echo "skip_review=true" >> $GITHUB_OUTPUT
          else
            echo "skip_review=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Gemini Review
        if: steps.get_diff.outputs.skip_review == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const diff_output = fs.readFileSync("diff.txt", "utf8");
            
            // 💡 퀄리티: PR 제목과 내용을 가져와 AI에게 맥락 제공
            const pr_title = context.payload.pull_request.title;
            const pr_body = context.payload.pull_request.body || "내용 없음";
            
            const { GoogleGenerativeAI } = require("@google/generative-ai");
            const genAI = new GoogleGenerativeAI("${{ secrets.GEMINI_API_KEY }}");
            const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" });
            
            // 💡 프롬프트 엔지니어링: 아키텍처, 제안 문법, CS 질문 유도
            const prompt = `You are a senior iOS software engineer performing a code review.
            
            [PR Context]
            Title: ${pr_title}
            Description: ${pr_body}
            
            [Review Criteria]
            1. Architecture: Evaluate based on MVVM and Clean Architecture principles (e.g., separation of concerns, dependency injection).
            2. Code Quality: Focus on protocol design, value vs reference types, thread safety, and ARC/memory management.
            3. Actionable Feedback: If code improvements are needed, you MUST provide specific Swift code snippets using GitHub's \`\`\`suggestion syntax.
            4. CS Insight: Briefly suggest one relevant CS interview question based on the code (e.g., if collections are used, mention the memory structure difference between Array and LinkedList).
            
            Ignore comments and formatting. Write in Korean using Markdown without intro/outro.
            
            <git diff>
            ${diff_output}
            </git diff>`;
            
            const result = await model.generateContent(prompt);
            const text = result.response.text();
            fs.writeFileSync("review_result.txt", text);

      - name: Comment on Pull Request
        if: steps.get_diff.outputs.skip_review == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            if (fs.existsSync("review_result.txt")) {
              const body = fs.readFileSync("review_result.txt", "utf8");
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body
              });
            }